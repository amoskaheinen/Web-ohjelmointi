<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ravintolat (AJAX API)</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <h1>Ravintolat</h1>

    <div id="error-message"></div>

    <div id="filters" style="margin-bottom: 20px">
      <button data-filter="All">Kaikki ravintolat</button>
      <button data-filter="Sodexo">Sodexo</button>
      <button data-filter="Compass Group">Compass Group</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nimi</th>
          <th>Osoite</th>
        </tr>
      </thead>
      <tbody id="restaurant-table-body"></tbody>
    </table>

    <dialog id="restaurant-modal">
      <div id="modal-content"></div>
      <button id="close-dialog">Sulje</button>
    </dialog>
  </body>
</html>
